<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen C Playground</title>
    <meta name="description" content="Interactive playground for the Zen C systems programming language.">
    <link rel="stylesheet" href="/style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Kaisei+Tokumin:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟩</text></svg>">

    <script>
        (function () {
            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            };
            const savedTheme = getCookie('theme') || localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <style>
        .playground-main {
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px 2rem;
            width: 100%;
            box-sizing: border-box;
            gap: 20px;
        }

        .zen-panel {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            border-left: 4px solid #cbd5e1;
            background-color: var(--surface);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] .zen-panel {
            border-color: #2d2d2a;
            border-left-color: #475569;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .zen-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.015);
            /* Raked sand texture on header for Zen vibe */
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(180, 170, 150, 0.06) 10px,
                    rgba(180, 170, 150, 0.06) 11px);
        }

        [data-theme="dark"] .zen-panel-header {
            background-color: rgba(255, 255, 255, 0.01);
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.015) 10px,
                    rgba(255, 255, 255, 0.015) 11px);
        }

        .ui-btn {
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .ui-btn:hover {
            color: var(--fg);
        }

        .ui-select {
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .ui-select:hover {
            color: var(--fg);
        }

        .run-btn {
            color: var(--accent);
            font-weight: 600;
        }

        .run-btn:hover {
            color: #4ade80;
            /* Brighter green */
        }

        [data-theme="light"] .run-btn {
            color: #16a34a;
            /* Deeper green for light mode */
        }

        .playground-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 20px;
        }

        #editor-wrapper {
            flex: 1;
        }

        #editor-container {
            flex: 1;
            height: 100%;
            position: relative;
        }

        /* Make Monaco editor background transparent to let diagonal lines show */
        .monaco-editor,
        .monaco-editor-background,
        .monaco-editor .margin {
            background-color: transparent !important;
        }

        #terminal-wrapper {
            width: 35%;
            min-width: 400px;
            max-width: 600px;
            display: flex;
            flex-direction: column;
        }

        .terminal-output {
            flex: 1;
            padding: 15px 20px;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-y: auto;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            z-index: 10;
        }

        @media (max-width: 900px) {
            .playground-container {
                flex-direction: column;
            }

            #terminal-wrapper {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container nav-container">
            <a href="/" class="logo">Zen C <span class="version">v0.4.4</span></a>
            <nav>
                <div class="nav-links">
                    <a href="https://docs.zenc-lang.org/">Docs</a>
                    <a href="/playground.html" class="active">Playground</a>
                    <a href="/#sponsors">Sponsors</a>
                    <a href="https://github.com/zenc-lang/zenc" class="github-link">GitHub ↗</a>
                </div>

                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="playground-main" style="padding-top: 10px;">
        <div class="playground-container" style="gap: 24px;">
            <div id="editor-wrapper" class="zen-panel">
                <div class="zen-panel-header">
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <button class="ui-btn run-btn" id="run-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                            Run Code
                        </button>

                        <div style="width: 1px; height: 16px; background-color: var(--border); margin: 0 4px;"></div>

                        <button id="copy-btn" class="ui-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy
                        </button>

                        <div style="width: 1px; height: 16px; background-color: var(--border); margin: 0 4px;"></div>

                        <select id="examples-select" class="ui-select"
                            style="max-width: 200px; text-overflow: ellipsis;">
                        </select>
                    </div>
                </div>
                <div id="editor-container" style="padding-top: 5px;"></div>
            </div>

            <div id="terminal-wrapper" class="zen-panel">
                <div class="zen-panel-header">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)"
                            stroke-width="2">
                            <polyline points="4 17 10 11 4 5"></polyline>
                            <line x1="12" y1="19" x2="20" y2="19"></line>
                        </svg>
                        <span
                            style="font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; font-weight: 600;">OUTPUT</span>
                    </div>
                    <button id="clear-terminal" class="ui-btn" style="padding: 4px 8px;">Clear</button>
                </div>
                <div class="terminal-output" id="output">Welcome to the Zen C Playground.
                    Press 'Run' to compile and execute your code.</div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            monaco.languages.register({ id: 'zenc' });

            monaco.languages.setMonarchTokensProvider('zenc', {
                keywords: [
                    'fn', 'def', 'let', 'if', 'else', 'while', 'loop', 'break', 'continue',
                    'return', 'match', 'impl', 'struct', 'enum', 'trait', 'import', 'extern',
                    'pub', 'mut', 'const', 'type', 'self', 'Self'
                ],
                typeKeywords: [
                    'int', 'float', 'bool', 'char', 'str', 'void', 'u8', 'u16', 'u32', 'u64',
                    'i8', 'i16', 'i32', 'i64', 'f32', 'f64'
                ],
                operators: [
                    '=', '>', '<', '!', '~', '?', ':', '==', '<=', '>=', '!=',
                    '&&', '||', '++', '--', '+', '-', '*', '/', '&', '|', '^', '%',
                    '<<', '>>', '>>>', '+=', '-=', '*=', '/=', '&=', '|=', '^=',
                    '%=', '<<=', '>>=', '>>>=', '->', '=>'
                ],
                symbols: /[=><!~?:&|+\-*\/\^%]+/,
                tokenizer: {
                    root: [
                        [/[a-z_$][\w$]*/, {
                            cases: {
                                '@typeKeywords': 'type',
                                '@keywords': 'keyword',
                                '@default': 'identifier'
                            }
                        }],
                        [/[A-Z][\w$]*/, 'type'],
                        { include: '@whitespace' },
                        [/[{}()\[\]]/, '@brackets'],
                        [/@symbols/, {
                            cases: {
                                '@operators': 'operator',
                                '@default': ''
                            }
                        }],
                        [/\d*\.\d+([eE][\-+]?\d+)?/, 'number.float'],
                        [/0[xX][0-9a-fA-F]+/, 'number.hex'],
                        [/\d+/, 'number'],
                        [/[;,.]/, 'delimiter'],
                        [/"([^"\\]|\\.)*$/, 'string.invalid'],
                        [/"/, { token: 'string.quote', bracket: '@open', next: '@string' }],
                        [/'[^\\']'/, 'string'],
                        [/'/, 'string.invalid']
                    ],
                    string: [
                        [/[^\\"]+/, 'string'],
                        [/\\./, 'string.escape'],
                        [/"/, { token: 'string.quote', bracket: '@close', next: '@pop' }]
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, 'white'],
                        [/\/\*/, 'comment', '@comment'],
                        [/\/\/.*$/, 'comment'],
                    ],
                    comment: [
                        [/[^\/*]+/, 'comment'],
                        [/\/\*/, 'comment', '@push'],
                        ["\\*/", 'comment', '@pop'],
                        [/[\/*]/, 'comment']
                    ],
                }
            });

            monaco.editor.defineTheme('zenc-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'f97316', fontStyle: 'bold' },
                    { token: 'type', foreground: 'fbbf24' },
                    { token: 'function', foreground: '38bdf8' },
                    { token: 'string', foreground: 'a3e635' },
                    { token: 'number', foreground: 'fb7185' },
                    { token: 'comment', foreground: '71717a', fontStyle: 'italic' },
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.foreground': '#e2e8f0',
                    'editorLineNumber.foreground': '#475569',
                    'editor.lineHighlightBackground': '#ffffff05',
                    'editor.selectionBackground': '#334155',
                }
            });

            monaco.editor.defineTheme('zenc-light', {
                base: 'vs',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'c2410c', fontStyle: 'bold' },
                    { token: 'type', foreground: '7c3aed' },
                    { token: 'function', foreground: '0369a1' },
                    { token: 'string', foreground: '15803d' },
                    { token: 'number', foreground: 'be123c' },
                    { token: 'comment', foreground: '94a3b8', fontStyle: 'italic' },
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.foreground': '#1a1a19',
                    'editorLineNumber.foreground': '#94a3b8',
                    'editor.lineHighlightBackground': '#00000005',
                    'editor.selectionBackground': '#e2e8f0',
                }
            });

            const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'zenc-dark' : 'zenc-light';

            const examplesSelect = document.getElementById('examples-select');
            let examplesData = [];

            async function loadExamples() {
                try {
                    const resp = await fetch('examples.json');
                    examplesData = await resp.json();

                    // Clear existing and add new
                    examplesSelect.innerHTML = '<option value="">-- Select an Example --</option>';
                    examplesData.forEach((ex, idx) => {
                        const opt = document.createElement('option');
                        opt.value = idx;
                        opt.textContent = ex.title;
                        examplesSelect.appendChild(opt);
                    });
                } catch (err) {
                    console.error("Failed to load examples:", err);
                }
            }

            examplesSelect.addEventListener('change', (e) => {
                const idx = e.target.value;
                if (idx !== "" && examplesData[idx]) {
                    editor.setValue(examplesData[idx].code);
                }
            });

            loadExamples();

            const editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: `import "std/io.zc"\n\nfn main() {\n    println "Hello, Zen C!"\n\n    let x = 42\n    match x {\n        42 => println "The answer!"\n        _  => println "Something else"\n    }\n}`,
                language: 'zenc',
                theme: currentTheme,
                fontSize: 14,
                fontFamily: 'JetBrains Mono',
                minimap: { enabled: false },
                automaticLayout: true,
                cursorBlinking: 'smooth',
                padding: { top: 20 }
            });

            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    setTimeout(() => {
                        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'zenc-dark' : 'zenc-light';
                        monaco.editor.setTheme(newTheme);
                    }, 50);
                });
            }

            const runBtn = document.getElementById('run-btn');
            const output = document.getElementById('output');

            runBtn.addEventListener('click', async () => {
                const code = editor.getValue();
                output.innerText = "> Compiling and running...\n";

                try {
                    const response = await fetch('/api/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        output.innerText += `\n[Server Error ${response.status}]: ${errorText}\n`;
                        return;
                    }

                    const data = await response.json();

                    if (data.error && data.error !== "") {
                        output.innerText += "\n[Error]: " + data.error + "\n";
                    }
                    output.innerText = data.output || "No output returned.";
                } catch (err) {
                    output.innerText = "Error connecting to server: " + err.message;
                }
            });

            document.getElementById('clear-terminal').addEventListener('click', () => {
                output.innerText = "";
            });
        });
    </script>
</body>

</html>
