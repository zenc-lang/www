<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen C Playground</title>
    <meta name="description" content="Interactive playground for the Zen C systems programming language.">
    <link rel="stylesheet" href="/style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Kaisei+Tokumin:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟩</text></svg>">

    <!-- Xterm.js for ANSI Color Support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <script>
        (function () {
            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            };
            const savedTheme = getCookie('theme') || localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <style>
        /* =========================================
           ZEN C PLAYGROUND — Monk Style
           Matches the Zen Garden aesthetic of the
           main site: warm tones, serif headings,
           raked-sand textures, quiet animations.
           ========================================= */

        .playground-main {
            height: calc(100vh - 65px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
            gap: 0;
            min-height: 0 !important;
        }

        /* --- Panels --- */
        .zen-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
            min-height: 0 !important;
            box-sizing: border-box !important;
        }

        .zen-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            min-height: 0 !important;
            flex-shrink: 0 !important;
            box-sizing: border-box;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
            background-color: var(--surface);
            /* Raked sand texture — the monk's garden */
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(180, 170, 150, 0.04) 10px,
                    rgba(180, 170, 150, 0.04) 11px);
        }

        [data-theme="dark"] .zen-panel-header {
            background-color: var(--surface);
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.012) 10px,
                    rgba(255, 255, 255, 0.012) 11px);
        }

        /* --- Buttons & Controls --- */
        .ui-btn {
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: color 0.15s, background 0.15s, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.01em;
        }

        .ui-btn:hover {
            color: var(--fg);
            background: var(--surface-alt);
        }

        .ui-select {
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: color 0.15s, background 0.15s;
        }

        .ui-select:hover {
            color: var(--fg);
        }

        /* Run button — the accent pulse */
        .run-btn {
            color: var(--accent);
            font-weight: 700;
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 5px 14px;
            transition: color 0.15s, background 0.15s, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s;
        }

        .run-btn:hover {
            background: var(--accent);
            color: var(--bg);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.15);
        }

        [data-theme="light"] .run-btn {
            color: #15803d;
            border-color: #15803d;
        }

        [data-theme="light"] .run-btn:hover {
            background: #15803d;
            color: #fff;
            box-shadow: 0 4px 12px rgba(21, 128, 61, 0.15);
        }

        /* Loading animation for compile */
        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Grain Texture — the monk's workspace */
        .zen-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        [data-theme="dark"] .zen-grain {
            opacity: 0.1;
            filter: contrast(150%) brightness(100%);
        }

        /* --- Layout --- */
        .playground-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
            border-top: 1px solid var(--border);
            min-height: 0 !important;
        }

        #right-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
            min-height: 0 !important;
        }

        #editor-wrapper {
            flex: none;
            height: 60%;
            /* Balanced starting point */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            min-height: 150px !important;
            /* Physically protect status bar & tabs */
        }

        #layout-resizer {
            height: 2px;
            background: var(--border);
            cursor: row-resize;
            z-index: 100;
            transition: background 0.2s, height 0.2s;
        }

        #layout-resizer:hover,
        #layout-resizer.resizing {
            background: var(--accent);
            height: 4px;
        }

        /* --- Project Sidebar --- */
        #project-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: transparent;
        }

        #file-sidebar {
            width: 200px;
            min-width: 200px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--surface);
            /* Removed broad transition to fix theme-switch lag */
        }

        .sidebar-section-header {
            padding: 14px 16px 10px;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'JetBrains Mono', monospace;
        }

        #file-list {
            flex: 1;
            overflow-y: auto;
            padding: 2px 0;
        }

        .file-item {
            padding: 7px 16px;
            font-size: 0.82rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s, color 0.15s, border-left-color 0.15s;
            border-left: 2px solid transparent;
        }

        .file-item:hover {
            color: var(--fg);
            background: var(--surface-alt);
        }

        .file-item.active {
            color: var(--fg);
            background: var(--surface-alt);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .file-item .delete-file {
            margin-left: auto;
            opacity: 0;
            color: #ef4444;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.15s;
        }

        .file-item:hover .delete-file {
            opacity: 0.4;
        }

        .file-item .delete-file:hover {
            opacity: 1;
            background: rgba(239, 68, 68, 0.1);
        }

        /* --- Editor & Tabs --- */
        #editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #tab-bar {
            height: 36px;
            min-height: 36px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 8px;
            gap: 2px;
            flex-shrink: 0 !important;
        }

        #editor-container {
            flex: 1;
            width: 100%;
            position: relative;
        }

        .tab {
            padding: 0 14px;
            height: 28px;
            display: flex;
            align-items: center;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            font-size: 0.78rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--muted);
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.15s, border-bottom-color 0.15s;
            font-weight: 500;
        }

        .tab.active {
            color: var(--fg);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .tab:hover:not(.active) {
            color: var(--fg);
        }

        /* --- Terminal Output Pane --- */
        #terminal-wrapper {
            flex: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 100px !important;
            /* Protect terminal header */
        }

        #terminal-wrapper .zen-panel-header {
            min-height: 0 !important;
        }

        .terminal-output {
            flex: 1;
            overflow: hidden;
            min-height: 0;
            /* Critical for shrinking */
        }

        /* --- Tutorial Sidebar --- */
        #tutorial-sidebar {
            background: var(--surface);
        }

        #tutorial-sidebar h2 {
            font-family: 'Kaisei Tokumin', serif;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--primary);
            font-size: 1.15rem;
            margin-top: 0;
        }

        #tutorial-sidebar p {
            font-size: 0.88rem;
            line-height: 1.65;
        }

        #tutorial-sidebar code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            background: var(--surface-alt);
            padding: 0.1em 0.4em;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Tutorial list items */
        .tutorial-btn {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-left-color 0.15s;
            font-size: 0.82rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted);
            border-left: 3px solid transparent;
            font-family: 'Inter', sans-serif;
        }

        .tutorial-btn:first-child {
            border-top: 1px solid var(--border);
        }

        .tutorial-btn:hover {
            background: var(--surface-alt);
            color: var(--fg);
            border-left-color: var(--border);
        }

        /* --- Status Bar --- */
        .status-bar {
            height: 24px;
            background-color: var(--surface-alt);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            justify-content: space-between;
            z-index: 50;
            user-select: none;
            flex-shrink: 0 !important;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 100%;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 4px;
            height: 100%;
            transition: color 0.2s;
        }

        .status-indicator:hover {
            color: var(--fg);
        }

        .zen-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            box-shadow: 0 0 8px var(--accent);
        }

        .zen-dot.syncing {
            background: var(--num);
            box-shadow: 0 0 8px var(--num);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
            }
        }

        /* Zen Mastery Mission Refinement */
        #tutorial-mission {
            margin: 2.5rem 1.5rem 2rem 1.7rem;
            padding: 0 0 0 1.2rem;
            background: transparent;
            border: none;
            border-left: 2px solid var(--border);
            transition: border-color 0.4s ease;
        }

        #tutorial-mission.mission-success {
            border-left-color: var(--accent);
        }

        .mission-header {
            font-family: 'Kaisei Tokumin', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.4s ease;
        }

        #tutorial-mission.mission-success .mission-header {
            color: var(--accent);
        }

        /* Mastery Indicator in header */
        .mission-header::before {
            content: "○";
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            opacity: 0.5;
            margin-left: -2rem;
            position: absolute;
            transition: all 0.4s ease;
        }

        #tutorial-mission.mission-success .mission-header::before {
            content: "✓";
            color: var(--accent);
            opacity: 1;
            transform: scale(1.2);
        }

        /* --- Responsive --- */
        @media (max-width: 1024px) {
            .playground-container {
                flex-direction: column;
            }

            #tutorial-sidebar {
                width: 100% !important;
                max-width: 100% !important;
                min-width: 0 !important;
                height: 280px;
                border-right: none !important;
                border-bottom: 1px solid var(--border);
            }

            #file-sidebar {
                display: none;
            }

            #terminal-wrapper {
                flex: 1;
                height: auto;
                min-height: 0 !important;
            }

            .playground-main {
                height: calc(100vh - 60px);
            }
        }

        @media (max-width: 768px) {
            .playground-main {
                height: calc(100vh - 80px);
            }

            #tutorial-sidebar {
                height: 240px;
            }

            .status-bar {
                display: none;
                /* Hide on small screens for space */
            }
        }
    </style>
</head>

<body>
    <div class="zen-grain"></div>
    <header>
        <div class="container nav-container">
            <a href="/" class="logo">Zen C <span class="version">v0.4.4</span></a>
            <nav>
                <div class="nav-links">
                    <a href="https://docs.zenc-lang.org/">Docs</a>
                    <a href="/playground.html" class="active">Playground</a>
                    <a href="/#sponsors">Sponsors</a>
                    <a href="https://github.com/zenc-lang/zenc" class="github-link">GitHub ↗</a>
                </div>

                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="playground-main">
        <div class="playground-container" style="flex: 1; display: flex;">

            <!-- LEFT PANE: TUTORIALS -->
            <div id="tutorial-sidebar" class="zen-panel"
                style="width: 28%; min-width: 300px; max-width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;">
                <div class="zen-panel-header">
                    <span
                        style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 8px; letter-spacing: 0.08em; text-transform: uppercase;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        Guided Path
                    </span>
                </div>
                <div id="tutorial-content"
                    style="flex: 2; padding: 1.5rem; overflow-y: auto; font-family: 'Inter', sans-serif; font-size: 0.9rem; line-height: 1.7; color: var(--fg); border-bottom: 1px solid var(--border);">
                    <h2>Welcome to the Playground</h2>
                    <p style="color: var(--muted); margin-bottom: 1rem;">Select a tutorial below to learn the
                        fundamentals of Zen C right inside your browser.</p>
                </div>
                <!-- MISSION SECTION -->
                <div id="tutorial-mission" style="display: none;">
                    <div class="mission-header">
                        <span id="mission-title-text">Seeking Enlightenment</span>
                    </div>
                    <div id="mission-goal"
                        style="font-size: 0.92rem; font-weight: 400; color: var(--fg); line-height: 1.7; opacity: 0.85;">
                    </div>
                    <div id="mission-status" style="display: none;"></div>
                </div>
                <div id="tutorial-list" style="flex: 2; overflow-y: auto; background: var(--bg);">
                    <!-- JS fills this -->
                </div>
            </div>

            <!-- RIGHT COLUMN: EDITOR + OUTPUT -->
            <div id="right-column">
                <div id="editor-wrapper" class="zen-panel">
                    <div class="zen-panel-header">
                        <div style="display: flex; gap: 6px; align-items: center; flex: 1;">
                            <button class="ui-btn run-btn" id="run-btn">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12">
                                    <path d="M8 5v14l11-7z" />
                                </svg>
                                Run
                            </button>

                            <button id="copy-btn" class="ui-btn">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                Copy
                            </button>

                            <div style="width: 1px; height: 14px; background-color: var(--border); margin: 0 2px;">
                            </div>

                            <select id="examples-select" class="ui-select"
                                style="max-width: 150px; text-overflow: ellipsis;">
                                <option value="" disabled selected>-- Examples --</option>
                                <option value="reset">⟲ Reset Playground</option>
                            </select>

                            <button id="share-btn" class="ui-btn" style="color: var(--accent);">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                                    <polyline points="16 6 12 2 8 6"></polyline>
                                    <line x1="12" y1="2" x2="12" y2="15"></line>
                                </svg>
                                Share
                            </button>

                            <button id="download-zc-btn" class="ui-btn">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Download
                            </button>

                            <div style="flex: 1;"></div>

                            <button id="add-file-btn" class="ui-btn" style="color: var(--accent);">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                New File
                            </button>

                            <a href="https://github.com/zenc-lang/zenc/issues/new?title=%5BPlayground%5D%20"
                                target="_blank" class="ui-btn" style="text-decoration: none; color: var(--muted);">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                                Report Bug
                            </a>
                        </div>
                    </div>
                    <div id="project-area">
                        <div id="file-sidebar">
                            <div class="sidebar-section-header">
                                Project Files
                            </div>
                            <div id="file-list">
                                <!-- JS fills this -->
                            </div>
                        </div>
                        <div id="editor-main">
                            <div id="tab-bar">
                                <!-- JS fills this -->
                            </div>
                            <div id="editor-container"></div>

                            <div class="status-bar">
                                <div class="status-item">
                                    <div class="status-indicator">
                                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2.5">
                                            <polyline points="16 18 22 12 16 6"></polyline>
                                            <polyline points="8 6 2 12 8 18"></polyline>
                                        </svg>
                                        <span id="editor-lang-tag">Zen C</span>
                                    </div>
                                    <div class="status-indicator">
                                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2.5">
                                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                            <polyline points="13 2 13 9 20 9"></polyline>
                                        </svg>
                                        <span id="file-stats">1 file</span>
                                    </div>
                                </div>
                                <div class="status-item">
                                    <div class="status-indicator" title="Current line and column">
                                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2.5">
                                            <line x1="3" y1="12" x2="21" y2="12"></line>
                                            <line x1="3" y1="6" x2="21" y2="6"></line>
                                            <line x1="3" y1="18" x2="21" y2="18"></line>
                                        </svg>
                                        <span id="cursor-pos">Ln 1, Col 1</span>
                                    </div>
                                    <div class="status-indicator">
                                        <span id="sync-dot" class="zen-dot"></span>
                                        <span id="sync-status">Saved</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> <!-- Correctly close #editor-wrapper -->

                <!-- Resizer Handle -->
                <div id="layout-resizer"></div>

                <div id="terminal-wrapper" class="zen-panel">
                        <div class="zen-panel-header">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)"
                                    stroke-width="2.5">
                                    <polyline points="4 17 10 11 4 5"></polyline>
                                    <line x1="12" y1="19" x2="20" y2="19"></line>
                                </svg>
                                <span
                                    style="font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; font-weight: 700; text-transform: uppercase;">Output</span>
                            </div>
                            <button id="clear-terminal" class="ui-btn"
                                style="padding: 3px 8px; font-size: 0.75rem;">Clear</button>
                        </div>
                        <div class="terminal-output" id="output"></div>
                    </div>
                </div>
            </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            monaco.languages.register({ id: 'zenc' });

            monaco.languages.setMonarchTokensProvider('zenc', {
                keywords: [
                    'fn', 'def', 'let', 'if', 'else', 'while', 'loop', 'break', 'continue',
                    'return', 'match', 'impl', 'struct', 'enum', 'trait', 'import', 'extern',
                    'pub', 'mut', 'const', 'type', 'self', 'Self'
                ],
                typeKeywords: [
                    'int', 'float', 'bool', 'char', 'str', 'void', 'u8', 'u16', 'u32', 'u64',
                    'i8', 'i16', 'i32', 'i64', 'f32', 'f64'
                ],
                operators: [
                    '=', '>', '<', '!', '~', '?', ':', '==', '<=', '>=', '!=',
                    '&&', '||', '++', '--', '+', '-', '*', '/', '&', '|', '^', '%',
                    '<<', '>>', '>>>', '+=', '-=', '*=', '/=', '&=', '|=', '^=',
                    '%=', '<<=', '>>=', '>>>=', '->', '=>'
                ],
                symbols: /[=><!~?:&|+\-*\/\^%]+/,
                tokenizer: {
                    root: [
                        [/[a-z_$][\w$]*/, {
                            cases: {
                                '@typeKeywords': 'type',
                                '@keywords': 'keyword',
                                '@default': 'identifier'
                            }
                        }],
                        [/[A-Z][\w$]*/, 'type'],
                        { include: '@whitespace' },
                        [/[{}()\[\]]/, '@brackets'],
                        [/@symbols/, {
                            cases: {
                                '@operators': 'operator',
                                '@default': ''
                            }
                        }],
                        [/\d*\.\d+([eE][\-+]?\d+)?/, 'number.float'],
                        [/0[xX][0-9a-fA-F]+/, 'number.hex'],
                        [/\d+/, 'number'],
                        [/[;,.]/, 'delimiter'],
                        [/"([^"\\]|\\.)*$/, 'string.invalid'],
                        [/"/, { token: 'string.quote', bracket: '@open', next: '@string' }],
                        [/'[^\\']'/, 'string'],
                        [/'/, 'string.invalid']
                    ],
                    string: [
                        [/[^\\"]+/, 'string'],
                        [/\\./, 'string.escape'],
                        [/"/, { token: 'string.quote', bracket: '@close', next: '@pop' }]
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, 'white'],
                        [/\/\*/, 'comment', '@comment'],
                        [/\/\/.*$/, 'comment'],
                    ],
                    comment: [
                        [/[^\/*]+/, 'comment'],
                        [/\/\*/, 'comment', '@push'],
                        ["\\*/", 'comment', '@pop'],
                        [/[\/*]/, 'comment']
                    ],
                }
            });

            monaco.editor.defineTheme('zenc-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'f97316', fontStyle: 'bold' },
                    { token: 'type', foreground: 'fbbf24' },
                    { token: 'function', foreground: '38bdf8' },
                    { token: 'string', foreground: 'a3e635' },
                    { token: 'number', foreground: 'fb7185' },
                    { token: 'comment', foreground: '71717a', fontStyle: 'italic' },
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.foreground': '#e2e8f0',
                    'editorLineNumber.foreground': '#475569',
                    'editor.lineHighlightBackground': '#ffffff05',
                    'editor.selectionBackground': '#334155',
                }
            });

            monaco.editor.defineTheme('zenc-light', {
                base: 'vs',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'c2410c', fontStyle: 'bold' },
                    { token: 'type', foreground: '7c3aed' },
                    { token: 'function', foreground: '0369a1' },
                    { token: 'string', foreground: '15803d' },
                    { token: 'number', foreground: 'be123c' },
                    { token: 'comment', foreground: '94a3b8', fontStyle: 'italic' },
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.foreground': '#1a1a19',
                    'editorLineNumber.foreground': '#94a3b8',
                    'editor.lineHighlightBackground': '#00000005',
                    'editor.selectionBackground': '#e2e8f0',
                }
            });

            const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'zenc-dark' : 'zenc-light';

            // Project State
            let project = {
                files: {
                    "main.zc": `fn main() {\n    println "Welcome to the Zen C Playground!";\n\n    let a = 10;\n    let b = 32;\n    let sum = a + b;\n\n    println "The sum of {a} and {b} is {sum}.";\n}`
                },
                activeFile: "main.zc"
            };

            // Migrate/Load Project
            const savedProject = localStorage.getItem('zenc_project');
            if (savedProject) {
                try {
                    project = JSON.parse(savedProject);
                } catch (e) { console.error("Malformed project storage"); }
            } else {
                const oldCode = localStorage.getItem('zenc_code');
                if (oldCode) project.files["main.zc"] = oldCode;
            }

            // --- 1. CORE UI SELECTION ---
            const examplesSelect = document.getElementById('examples-select');
            const fileList = document.getElementById('file-list');
            const tabBar = document.getElementById('tab-bar');
            const cursorPos = document.getElementById('cursor-pos');
            const fileStats = document.getElementById('file-stats');
            const runBtn = document.getElementById('run-btn');

            // --- 2. MAIN EDITOR INITIALIZATION ---
            const editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: project.files[project.activeFile],
                language: 'zenc',
                theme: currentTheme,
                fontSize: 14,
                fontFamily: 'JetBrains Mono',
                minimap: { enabled: false },
                automaticLayout: true,
                cursorBlinking: 'smooth',
                padding: { top: 20 }
            });

            function updateStatusBar() {
                const count = Object.keys(project.files).length;
                fileStats.textContent = `${count} ${count === 1 ? 'file' : 'files'}`;
            }
            editor.onDidChangeCursorPosition((e) => {
                cursorPos.textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
            });
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => runBtn.click());

            // --- 3. WORKSPACE LOGIC ---
            function saveProject() {
                localStorage.setItem('zenc_project', JSON.stringify(project));
            }

            function updateProjectUI() {
                fileList.innerHTML = '';
                Object.keys(project.files).sort().forEach(filename => {
                    const item = document.createElement('div');
                    item.className = `file-item ${filename === project.activeFile ? 'active' : ''}`;
                    const isPlugin = filename.startsWith('plugins/');
                    const icon = isPlugin ? 
                        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>' : 
                        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>';
                    item.innerHTML = `${icon}<span>${filename}</span>${filename !== 'main.zc' ? '<span class="delete-file" title="Delete file">×</span>' : ''}`;
                    item.onclick = (e) => {
                        if (e.target.className === 'delete-file') deleteFile(filename);
                        else switchFile(filename);
                    };
                    fileList.appendChild(item);
                });
                tabBar.innerHTML = '';
                const tab = document.createElement('div');
                tab.className = 'tab active';
                tab.textContent = project.activeFile;
                tabBar.appendChild(tab);
                updateStatusBar();
            }

            function switchFile(filename) {
                if (project.activeFile === filename) return;
                project.files[project.activeFile] = editor.getValue();
                project.activeFile = filename;
                editor.setValue(project.files[filename]);
                updateProjectUI();
                saveProject();
                if (lspSocket && lspSocket.readyState === WebSocket.OPEN) {
                    sendLSPNotification('textDocument/didChange', {
                        textDocument: { uri: `file:///${filename}`, version: ++version },
                        contentChanges: [{ text: editor.getValue() }]
                    });
                }
            }

            function addFile() {
                const name = prompt("Enter filename (e.g. plugins/my_plugin.zc):", "plugins/new_plugin.zc");
                if (name && !project.files[name]) {
                    if (!name.endsWith('.zc')) { alert("Files must end with .zc"); return; }
                    let content = `// New file: ${name}\n`;
                    if (name.startsWith('plugins/')) {
                        const pName = name.split('/').pop().replace('.zc', '');
                        content = `import "std/plugin.zc"\n\nfn ${pName}_handler(body: char*, api: ZApi*) {\n    fputs("// Transpiled ${pName}\\n", api.out);\n}\n\nlet ${pName}_plugin = ZPlugin { name: "${pName}", handler: ${pName}_handler };\n\n@export fn z_plugin_init() -> ZPlugin* { return &${pName}_plugin; }`;
                    }
                    project.files[name] = content;
                    switchFile(name);
                }
            }

            function deleteFile(name) {
                if (name === 'main.zc') return;
                if (confirm(`Delete ${name}?`)) {
                    delete project.files[name];
                    if (project.activeFile === name) {
                        project.activeFile = "main.zc";
                        editor.setValue(project.files["main.zc"]);
                    }
                    updateProjectUI();
                    saveProject();
                }
            }
            document.getElementById('add-file-btn').onclick = addFile;

            // --- 4. TUTORIALS & EXAMPLES ---
            const tutorialsData = [
                {
                    id: 'hello-world', title: '1. Hello, Zen C!',
                    content: `<h2>Hello, Zen C!</h2><p>Every Zen C program starts with <code>main</code>.</p>`,
                    mission: "Change the message to <b>'Zenith of C!'</b>",
                    code: `fn main() {\n    println "Hello, World!";\n}`,
                    validator: (output, code) => output.includes("Zenith of C!")
                },
                {
                    id: 'plugins', title: '6. The Plugin Weave',
                    content: `<h2>DSL Plugins</h2><p>Extend Zen C with your own DSLs.</p>`,
                    mission: "Observe the transpiler output in the terminal.",
                    code: `import plugin "plugins/my_plugin" as my\n\nfn main() {\n    my! { some content }\n}`,
                    setup: async (proj) => {
                        proj.files["plugins/my_plugin.zc"] = `import "std/plugin.zc"\nfn my_handler(body: char*, api: ZApi*) { fputs("// Custom DSL\\n", api.out); }\nlet my_plugin = ZPlugin { name: "my", handler: my_handler };\n@export fn z_plugin_init() -> ZPlugin* { return &my_plugin; }`;
                    },
                    validator: (output, code) => output.includes("Custom DSL")
                }
            ];

            const tutorialList = document.getElementById('tutorial-list');
            const tutorialContent = document.getElementById('tutorial-content');
            const tutorialMission = document.getElementById('tutorial-mission');
            const missionGoal = document.getElementById('mission-goal');
            let currentTutorialIndex = -1;

            function hydrateTutorials(activeEditor) {
                tutorialList.innerHTML = '';
                tutorialsData.forEach((tut, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'tutorial-btn';
                    btn.innerHTML = `<div>${tut.title}</div><div class="tut-status-icon"></div>`;
                    btn.onclick = (async () => {
                        currentTutorialIndex = idx;
                        if (tut.setup) await tut.setup(project);
                        project.files["main.zc"] = tut.code;
                        project.activeFile = "main.zc";
                        activeEditor.setValue(tut.code);
                        updateProjectUI();
                        saveProject();
                        tutorialContent.innerHTML = tut.content;
                        tutorialMission.style.display = 'block';
                        missionGoal.innerHTML = tut.mission;
                        tutorialMission.classList.remove('mission-success');
                        document.getElementById('mission-title-text').textContent = (tut.completed ? 'Mastery Achieved' : 'Seeking Enlightenment');
                    });
                    tutorialList.appendChild(btn);
                });
            }

            let examplesData = [];
            async function loadExamples() {
                try {
                    const resp = await fetch('examples.json');
                    examplesData = await resp.json();
                    examplesSelect.innerHTML = '<option value="" disabled selected>-- Reference Code --</option>';
                    examplesData.forEach((ex, idx) => {
                        const opt = document.createElement('option');
                        opt.value = idx; opt.textContent = ex.title;
                        examplesSelect.appendChild(opt);
                    });
                } catch (err) { console.error("Examples failed:", err); }
            }

            // --- 5. LSP & TERMINAL ---
            let lspSocket = null, requestId = 0, version = 1;
            const pendingRequests = new Map();

            function connectLSP() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const host = window.location.host;
                lspSocket = new WebSocket(`${protocol}//${host}/api/lsp`);
                lspSocket.onopen = () => {
                    sendLSPRequest('initialize', { processId: null, rootUri: 'file:///', capabilities: {} });
                    Object.entries(project.files).forEach(([f, c]) => {
                        sendLSPNotification('textDocument/didOpen', { textDocument: { uri: `file:///${f}`, languageId: 'zenc', version: 1, text: c } });
                    });
                };
                lspSocket.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.id !== undefined && pendingRequests.has(msg.id)) {
                        const { resolve } = pendingRequests.get(msg.id);
                        pendingRequests.delete(msg.id);
                        resolve(msg.result);
                        if (msg.id === 0) sendLSPNotification('initialized', {});
                    } else if (msg.method === 'textDocument/publishDiagnostics') updateDiagnostics(msg.params.diagnostics);
                };
                lspSocket.onclose = () => setTimeout(connectLSP, 5000);
            }

            function sendLSPRequest(method, params) {
                const id = requestId++;
                return new Promise(resolve => { pendingRequests.set(id, { resolve }); lspSocket.send(JSON.stringify({ jsonrpc: '2.0', id, method, params })); });
            }

            function sendLSPNotification(method, params) {
                if (lspSocket && lspSocket.readyState === WebSocket.OPEN) lspSocket.send(JSON.stringify({ jsonrpc: '2.0', method, params }));
            }

            function updateDiagnostics(diagnostics) {
                const markers = diagnostics.map(d => ({
                    severity: d.severity === 1 ? monaco.MarkerSeverity.Error : monaco.MarkerSeverity.Warning,
                    message: d.message,
                    startLineNumber: d.range.start.line + 1, startColumn: d.range.start.character + 1,
                    endLineNumber: d.range.end.line + 1, endColumn: d.range.end.character + 1
                }));
                monaco.editor.setModelMarkers(editor.getModel(), 'zenc', markers);
            }

            editor.onDidChangeModelContent(() => {
                sendLSPNotification('textDocument/didChange', { textDocument: { uri: `file:///${project.activeFile}`, version: ++version }, contentChanges: [{ text: editor.getValue() }] });
            });

            monaco.languages.registerHoverProvider('zenc', {
                provideHover: async (model, position) => {
                    const res = await sendLSPRequest('textDocument/hover', { textDocument: { uri: `file:///${project.activeFile}` }, position: { line: position.lineNumber - 1, character: position.column - 1 } });
                    if (res && res.contents) return { contents: [{ value: res.contents.value }] };
                }
            });

            monaco.languages.registerCompletionItemProvider('zenc', {
                triggerCharacters: ['.', ':', '-', '>'],
                provideCompletionItems: async (model, position) => {
                    const res = await sendLSPRequest('textDocument/completion', { textDocument: { uri: `file:///${project.activeFile}` }, position: { line: position.lineNumber - 1, character: position.column - 1 } });
                    if (res) {
                        const items = (Array.isArray(res) ? res : res.items) || [];
                        return { suggestions: items.map(item => ({
                            label: item.label, kind: item.kind - 1 || monaco.languages.CompletionItemKind.Property,
                            insertText: item.label, detail: item.detail
                        }))};
                    }
                }
            });

            try {
                connectLSP();
                if (window.Terminal) {
                    const terminal = new Terminal({ cursorBlink: true, fontSize: 13, fontFamily: 'JetBrains Mono, monospace', theme: { background: '#00000000', foreground: '#e2e8f0' }, allowTransparency: true, convertEol: true });
                    const fitAddon = new FitAddon.FitAddon(); terminal.loadAddon(fitAddon);
                    const outDiv = document.getElementById('output');
                    if (outDiv) { terminal.open(outDiv); window.terminal = terminal; }
                    
                    const updateTerminalTheme = (theme) => {
                        const isDark = theme === 'dark';
                        terminal.options.theme = isDark ? { background: '#0c0c0b', foreground: '#e2e8f0', cursor: '#4ade80' } : { background: '#fdfdfc', foreground: '#1a1a19', cursor: '#15803d' };
                    };
                    updateTerminalTheme(localStorage.getItem('theme') || 'dark');
                    window.addEventListener('resize', () => fitAddon.fit());
                    setTimeout(() => fitAddon.fit(), 100);

                    const drawHeader = () => { terminal.clear(); terminal.writeln("\x1b[32m>\x1b[0m \x1b[1mZen C Playground\x1b[0m"); terminal.writeln("\x1b[90mPress Run to compile and execute.\x1b[0m\r\n"); };
                    drawHeader();
                    document.getElementById('clear-terminal').onclick = drawHeader;

                    runBtn.onclick = async () => {
                        project.files[project.activeFile] = editor.getValue(); saveProject();
                        runBtn.disabled = true; runBtn.innerHTML = '<span class="loading-spinner"></span> Compiling...';
                        drawHeader(); terminal.writeln("\x1b[90m>> Starting build pipeline...\x1b[0m");
                        try {
                            const response = await fetch('/api/run', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ files: project.files }) });
                            const data = await response.json();
                            if (data.output) terminal.write(data.output + "\r\n");
                            if (currentTutorialIndex !== -1) {
                                const tut = tutorialsData[currentTutorialIndex];
                                if (tut.validator(data.output || "", editor.getValue())) {
                                    tut.completed = true;
                                    document.getElementById('mission-title-text').textContent = 'Mastery Achieved';
                                    document.getElementById('tutorial-mission').classList.add('mission-success');
                                }
                            }
                            if (data.error && !data.output) terminal.writeln("\x1b[1;31m\r\n[Error]:\x1b[0m " + data.error);
                            else if (!data.error) terminal.writeln(`\x1b[1;32m\r\n[Success]:\x1b[0m Process finished.`);
                        } catch (err) { terminal.writeln("\x1b[1;31m\r\n[Connection Error]:\x1b[0m " + err.message); }
                        finally { runBtn.disabled = false; runBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M8 5v14l11-7z" /></svg> Run Code'; fitAddon.fit(); }
                    };
                }

                // --- 6. SHARING & FINAL BOOT ---
                document.getElementById('share-btn').onclick = () => {
                    project.files[project.activeFile] = editor.getValue();
                    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(project))));
                    const url = new URL(window.location.href); url.searchParams.set('project', encoded);
                    window.history.replaceState({}, '', url);
                    navigator.clipboard.writeText(url.href).then(() => {
                        const btn = document.getElementById('share-btn'); const old = btn.innerHTML; btn.innerHTML = '✓ Copied!';
                        setTimeout(() => btn.innerHTML = old, 2000);
                    });
                };

                const urlParams = new URLSearchParams(window.location.search);
                const sharedProject = urlParams.get('project');
                if (sharedProject) {
                    try {
                        const imported = JSON.parse(decodeURIComponent(escape(atob(sharedProject))));
                        if (imported && imported.files) { project = imported; saveProject(); }
                    } catch (e) { console.error("Import failed", e); }
                }

                updateProjectUI();
                hydrateTutorials(editor);
                loadExamples();

                // --- 7. RESIZER LOGIC ---
                const resizer = document.getElementById('layout-resizer');
                const editorWrapper = document.getElementById('editor-wrapper');
                const terminalWrapper = document.getElementById('terminal-wrapper');
                const rightColumn = document.getElementById('right-column');
                let isResizing = false, startY, startHeight;

                resizer.onmousedown = (e) => {
                    isResizing = true; startY = e.clientY; startHeight = editorWrapper.getBoundingClientRect().height;
                    resizer.classList.add('resizing');
                    const overlay = document.createElement('div'); overlay.id = 'resize-overlay';
                    overlay.style.position = 'fixed'; overlay.style.inset = '0'; overlay.style.zIndex = '9999'; overlay.style.cursor = 'row-resize';
                    document.body.appendChild(overlay);
                };

                window.onmousemove = (e) => {
                    if (!isResizing) return;
                    const deltaY = e.clientY - startY;
                    const totalHeight = rightColumn.getBoundingClientRect().height;
                    const clampedPx = Math.max(150, Math.min(totalHeight - 100, startHeight + deltaY));
                    const pct = (clampedPx / totalHeight) * 100;
                    editorWrapper.style.height = `${pct}%`;
                    terminalWrapper.style.height = `${100 - pct}%`;
                    terminalWrapper.style.flex = "none";
                    editor.layout();
                };

                window.onmouseup = () => { if (isResizing) { isResizing = false; resizer.classList.remove('resizing'); document.getElementById('resize-overlay')?.remove(); localStorage.setItem('zenc_editor_height', editorWrapper.style.height); } };

                const savedHeight = localStorage.getItem('zenc_editor_height');
                if (savedHeight) {
                    editorWrapper.style.height = savedHeight;
                    const pct = parseFloat(savedHeight);
                    if (!isNaN(pct)) { terminalWrapper.style.height = `${100 - pct}%`; terminalWrapper.style.flex = "none"; }
                    setTimeout(() => { editor.layout(); }, 100);
                }

                document.getElementById('copy-btn').onclick = () => {
                    navigator.clipboard.writeText(editor.getValue());
                    const btn = document.getElementById('copy-btn'); const old = btn.innerHTML; btn.innerHTML = 'Copied!';
                    setTimeout(() => btn.innerHTML = old, 2000);
                };

                const themeToggle = document.getElementById('theme-toggle');
                if (themeToggle) {
                    themeToggle.onclick = () => {
                        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                        document.documentElement.setAttribute('data-theme', newTheme);
                        localStorage.setItem('theme', newTheme);
                        monaco.editor.setTheme(newTheme === 'dark' ? 'zenc-dark' : 'zenc-light');
                    };
                }

            } catch (err) {
                console.error("Initialization failed:", err);
            }
        });
    </script>
</body>

</html>
