<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen C Playground</title>
    <meta name="description" content="Interactive playground for the Zen C systems programming language.">
    <link rel="stylesheet" href="/style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Kaisei+Tokumin:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟩</text></svg>">

    <script>
        (function () {
            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            };
            const savedTheme = getCookie('theme') || localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <style>
        .playground-main {
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
            gap: 0;
            border-top: 1px solid var(--border);
        }

        .zen-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: transparent;
        }

        [data-theme="dark"] .zen-panel {
            background-color: transparent;
        }

        .zen-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
            min-height: 48px;
            flex-shrink: 0;
            box-sizing: border-box;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
            background-color: transparent;
            /* Raked sand texture on header for Zen vibe */
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(180, 170, 150, 0.05) 10px,
                    rgba(180, 170, 150, 0.05) 11px);
        }

        [data-theme="dark"] .zen-panel-header {
            background-color: transparent;
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.015) 10px,
                    rgba(255, 255, 255, 0.015) 11px);
        }

        .ui-btn {
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .ui-btn:hover {
            color: var(--fg);
        }

        .ui-select {
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .ui-select:hover {
            color: var(--fg);
        }

        .run-btn {
            color: var(--accent);
            font-weight: 600;
        }

        .run-btn:hover {
            color: #4ade80;
            /* Brighter green */
        }

        [data-theme="light"] .run-btn {
            color: #16a34a;
            /* Deeper green for light mode */
        }

        .playground-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        #right-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #editor-wrapper {
            flex: 2;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #editor-container {
            flex: 1;
            height: 100%;
            position: relative;
        }

        /* Make Monaco editor background transparent to let diagonal lines show */
        .monaco-editor,
        .monaco-editor-background,
        .monaco-editor .margin {
            background-color: transparent !important;
        }

        #terminal-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
        }

        .terminal-output {
            flex: 1;
            padding: 15px 20px;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-y: auto;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            z-index: 10;
        }

        @media (max-width: 1024px) {
            .playground-container {
                flex-direction: column;
            }

            #tutorial-sidebar {
                width: 100% !important;
                height: 300px;
                border-right: none !important;
                border-bottom: 1px solid var(--border);
            }

            #terminal-wrapper {
                height: 250px;
                flex: none;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container nav-container">
            <a href="/" class="logo">Zen C <span class="version">v0.4.4</span></a>
            <nav>
                <div class="nav-links">
                    <a href="https://docs.zenc-lang.org/">Docs</a>
                    <a href="/playground.html" class="active">Playground</a>
                    <a href="/#sponsors">Sponsors</a>
                    <a href="https://github.com/zenc-lang/zenc" class="github-link">GitHub ↗</a>
                </div>

                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="playground-main" style="padding: 0; display: flex; flex-direction: column;">
        <div class="playground-container" style="flex: 1; display: flex;">

            <!-- LEFT PANE: TUTORIALS -->
            <div id="tutorial-sidebar" class="zen-panel"
                style="width: 28%; min-width: 320px; max-width: 400px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--surface);">
                <div class="zen-panel-header"
                    style="height: 48px; min-height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px;">
                    <span
                        style="font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--fg); display: flex; align-items: center; gap: 8px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        Guided Tutorials
                    </span>
                </div>
                <div id="tutorial-content"
                    style="flex: 3; padding: 1.5rem; overflow-y: auto; font-family: 'Inter', sans-serif; font-size: 0.95rem; line-height: 1.6; color: var(--fg); border-bottom: 1px solid var(--border);">
                    <h2 style="margin-top: 0; font-size: 1.25rem;">Welcome to the Playground</h2>
                    <p style="color: var(--muted); margin-bottom: 1rem;">Select a tutorial below to learn the
                        fundamentals of Zen C right inside your browser.</p>
                </div>
                <div id="tutorial-list" style="flex: 2; overflow-y: auto; background: var(--bg);">
                    <!-- JS fills this -->
                </div>
            </div>

            <!-- RIGHT COLUMN: EDITOR + OUTPUT -->
            <div id="right-column">
                <div id="editor-wrapper" class="zen-panel" style="border-right: none;">
                    <div class="zen-panel-header">
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <button class="ui-btn run-btn" id="run-btn">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                                    <path d="M8 5v14l11-7z" />
                                </svg>
                                Run Code
                            </button>

                            <div style="width: 1px; height: 16px; background-color: var(--border); margin: 0 4px;">
                            </div>

                            <button id="copy-btn" class="ui-btn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                Copy
                            </button>

                            <div style="width: 1px; height: 16px; background-color: var(--border); margin: 0 4px;">
                            </div>

                            <select id="examples-select" class="ui-select"
                                style="max-width: 200px; text-overflow: ellipsis;">
                                <option value="" disabled selected>-- Load Reference Code --</option>
                            </select>
                        </div>
                    </div>
                    <div id="editor-container" style="padding-top: 5px;"></div>
                </div>

                <div id="terminal-wrapper" class="zen-panel" style="border-right: none;">
                    <div class="zen-panel-header">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)"
                                stroke-width="2">
                                <polyline points="4 17 10 11 4 5"></polyline>
                                <line x1="12" y1="19" x2="20" y2="19"></line>
                            </svg>
                            <span
                                style="font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; font-weight: 600;">OUTPUT</span>
                        </div>
                        <button id="clear-terminal" class="ui-btn" style="padding: 4px 8px;">Clear</button>
                    </div>
                    <div class="terminal-output" id="output">Welcome to the Zen C Playground.&#13;&#10;Press 'Run' to
                        compile and execute your code.</div>
                </div>
            </div>
        </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            monaco.languages.register({ id: 'zenc' });

            monaco.languages.setMonarchTokensProvider('zenc', {
                keywords: [
                    'fn', 'def', 'let', 'if', 'else', 'while', 'loop', 'break', 'continue',
                    'return', 'match', 'impl', 'struct', 'enum', 'trait', 'import', 'extern',
                    'pub', 'mut', 'const', 'type', 'self', 'Self'
                ],
                typeKeywords: [
                    'int', 'float', 'bool', 'char', 'str', 'void', 'u8', 'u16', 'u32', 'u64',
                    'i8', 'i16', 'i32', 'i64', 'f32', 'f64'
                ],
                operators: [
                    '=', '>', '<', '!', '~', '?', ':', '==', '<=', '>=', '!=',
                    '&&', '||', '++', '--', '+', '-', '*', '/', '&', '|', '^', '%',
                    '<<', '>>', '>>>', '+=', '-=', '*=', '/=', '&=', '|=', '^=',
                    '%=', '<<=', '>>=', '>>>=', '->', '=>'
                ],
                symbols: /[=><!~?:&|+\-*\/\^%]+/,
                tokenizer: {
                    root: [
                        [/[a-z_$][\w$]*/, {
                            cases: {
                                '@typeKeywords': 'type',
                                '@keywords': 'keyword',
                                '@default': 'identifier'
                            }
                        }],
                        [/[A-Z][\w$]*/, 'type'],
                        { include: '@whitespace' },
                        [/[{}()\[\]]/, '@brackets'],
                        [/@symbols/, {
                            cases: {
                                '@operators': 'operator',
                                '@default': ''
                            }
                        }],
                        [/\d*\.\d+([eE][\-+]?\d+)?/, 'number.float'],
                        [/0[xX][0-9a-fA-F]+/, 'number.hex'],
                        [/\d+/, 'number'],
                        [/[;,.]/, 'delimiter'],
                        [/"([^"\\]|\\.)*$/, 'string.invalid'],
                        [/"/, { token: 'string.quote', bracket: '@open', next: '@string' }],
                        [/'[^\\']'/, 'string'],
                        [/'/, 'string.invalid']
                    ],
                    string: [
                        [/[^\\"]+/, 'string'],
                        [/\\./, 'string.escape'],
                        [/"/, { token: 'string.quote', bracket: '@close', next: '@pop' }]
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, 'white'],
                        [/\/\*/, 'comment', '@comment'],
                        [/\/\/.*$/, 'comment'],
                    ],
                    comment: [
                        [/[^\/*]+/, 'comment'],
                        [/\/\*/, 'comment', '@push'],
                        ["\\*/", 'comment', '@pop'],
                        [/[\/*]/, 'comment']
                    ],
                }
            });

            monaco.editor.defineTheme('zenc-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'f97316', fontStyle: 'bold' },
                    { token: 'type', foreground: 'fbbf24' },
                    { token: 'function', foreground: '38bdf8' },
                    { token: 'string', foreground: 'a3e635' },
                    { token: 'number', foreground: 'fb7185' },
                    { token: 'comment', foreground: '71717a', fontStyle: 'italic' },
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.foreground': '#e2e8f0',
                    'editorLineNumber.foreground': '#475569',
                    'editor.lineHighlightBackground': '#ffffff05',
                    'editor.selectionBackground': '#334155',
                }
            });

            monaco.editor.defineTheme('zenc-light', {
                base: 'vs',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'c2410c', fontStyle: 'bold' },
                    { token: 'type', foreground: '7c3aed' },
                    { token: 'function', foreground: '0369a1' },
                    { token: 'string', foreground: '15803d' },
                    { token: 'number', foreground: 'be123c' },
                    { token: 'comment', foreground: '94a3b8', fontStyle: 'italic' },
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.foreground': '#1a1a19',
                    'editorLineNumber.foreground': '#94a3b8',
                    'editor.lineHighlightBackground': '#00000005',
                    'editor.selectionBackground': '#e2e8f0',
                }
            });

            const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'zenc-dark' : 'zenc-light';

            const examplesSelect = document.getElementById('examples-select');
            let examplesData = [];

            async function loadExamples() {
                try {
                    const resp = await fetch('examples.json');
                    examplesData = await resp.json();

                    // Clear existing and add new
                    examplesSelect.innerHTML = '<option value="" disabled selected>-- Load Reference Code --</option>';
                    examplesData.forEach((ex, idx) => {
                        const opt = document.createElement('option');
                        opt.value = idx;
                        opt.textContent = ex.title;
                        examplesSelect.appendChild(opt);
                    });
                } catch (err) {
                    console.error("Failed to load examples:", err);
                }
            }

            // Tutorial Data & Hydration
            const tutorialsData = [
                {
                    id: 'hello-world',
                    title: '1. Hello World',
                    content: `<h2>Hello World</h2>
                    <p style="color: var(--muted); margin-bottom: 1rem;">Let's get started with Zen C.</p>
                    <p>Every executable Zen C program must begin with a <code>main</code> function. The syntax is simple and clean.</p>
                    <p>Unlike standard C, you can use the <code>println</code> builtin macro to automatically print complete strings with a trailing newline, without importing standard IO headers!</p>`,
                    code: `fn main() {\n    println "Hello, World!";\n}`
                },
                {
                    id: 'variables',
                    title: '2. Variables & Constants',
                    content: `<h2>Variables & Constants</h2>
                    <p style="color: var(--muted); margin-bottom: 1rem;">Storage is explicitly defined.</p>
                    <p>Zen C strictly separates true compile-time constants (<code>def</code>) from runtime memory variables (<code>let</code>).</p>
                    <p>By default variables are mutable, but you can explicitly mark them <code>const</code> to prevent reassignment. String interpolation is built right into the language using curly braces!</p>`,
                    code: `def PI = 3.14159;\n\nfn main() {\n    let radius = 10.0;\n    let area = PI * radius * radius;\n    println "Area: {area}";\n}`
                },
                {
                    id: 'control-flow',
                    title: '3. Control Flow',
                    content: `<h2>Control Flow</h2>
                    <p style="color: var(--muted); margin-bottom: 1rem;">Branching and iterating seamlessly.</p>
                    <p>Zen C drops the unnecessary parentheses from <code>if</code> statements and <code>while</code> loops, adopting a much cleaner modern syntax.</p>`,
                    code: `fn main() {\n    let count = 3;\n    while count > 0 {\n        println "T-minus {count}..";\n        count = count - 1;\n    }\n    if count == 0 {\n        println "Liftoff!";\n    }\n}`
                },
                {
                    id: 'structs',
                    title: '4. Structs',
                    content: `<h2>Structs</h2>
                    <p style="color: var(--muted); margin-bottom: 1rem;">Organizing data efficiently.</p>
                    <p>Structs in Zen C use a modern block syntax. You can initialize them using field-value pairs, making your code highly readable.</p>`,
                    code: `struct Point {\n    x: i32,\n    y: i32,\n}\n\nfn main() {\n    let p = Point { x: 10, y: 20 };\n    println "Point: ({p.x}, {p.y})";\n}`
                },
                {
                    id: 'pointers',
                    title: '5. Pointers',
                    content: `<h2>Pointers</h2>
                    <p style="color: var(--muted); margin-bottom: 1rem;">Direct memory access.</p>
                    <p>Zen C provides safe and explicit pointer syntax. Use <code>&</code> to get an address and <code>*</code> to dereference.</p>`,
                    code: `fn main() {\n    let x = 42;\n    let ptr = &x;\n    println "Value: {*ptr}";\n    \n    *ptr = 100;\n    println "New Value: {x}";\n}`
                }
            ];

            const tutorialList = document.getElementById('tutorial-list');
            const tutorialContent = document.getElementById('tutorial-content');

            function hydrateTutorials(activeEditor) {
                tutorialList.innerHTML = '';
                tutorialsData.forEach((tut, idx) => {
                    const btn = document.createElement('div');
                    btn.style.cssText = "padding: 12px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; justify-content: space-between;";
                    if (idx === 0) btn.style.borderTop = "1px solid var(--border)";

                    const titleSpan = document.createElement('span');
                    titleSpan.textContent = tut.title;
                    btn.appendChild(titleSpan);

                    // Add a tiny 'play' indicator icon
                    const icon = document.createElement('div');
                    icon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
                    icon.style.opacity = "0.3";
                    btn.appendChild(icon);

                    btn.addEventListener('mouseenter', () => {
                        btn.style.background = "var(--surface-alt)";
                        icon.style.opacity = "0.8";
                        icon.style.color = "var(--primary)";
                    });
                    btn.addEventListener('mouseleave', () => {
                        btn.style.background = "transparent";
                        icon.style.opacity = "0.3";
                        icon.style.color = "currentColor";
                    });

                    btn.addEventListener('click', () => {
                        tutorialContent.innerHTML = tut.content;
                        activeEditor.setValue(tut.code);
                    });

                    tutorialList.appendChild(btn);
                });
            }

            examplesSelect.addEventListener('change', (e) => {
                const idx = e.target.value;
                if (idx !== "" && examplesData[idx]) {
                    // Update editor if it exists (captured in closure below)
                    window._globalEditorInstance.setValue(examplesData[idx].code);
                }
            });

            loadExamples();

            const editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: `fn main() {\n    println "Welcome to the Zen C Playground!";\n\n    let a = 10;\n    let b = 32;\n    let sum = a + b;\n\n    println "The sum of {a} and {b} is {sum}.";\n}`,
                language: 'zenc',
                theme: currentTheme,
                fontSize: 14,
                fontFamily: 'JetBrains Mono',
                minimap: { enabled: false },
                automaticLayout: true,
                cursorBlinking: 'smooth',
                padding: { top: 20 }
            });

            // Hydrate logic
            window._globalEditorInstance = editor;
            hydrateTutorials(editor);

            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    setTimeout(() => {
                        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'zenc-dark' : 'zenc-light';
                        monaco.editor.setTheme(newTheme);
                    }, 50);
                });
            }

            const runBtn = document.getElementById('run-btn');
            const output = document.getElementById('output');

            runBtn.addEventListener('click', async () => {
                const code = editor.getValue();
                output.innerText = "> Compiling and running...\n";

                try {
                    const response = await fetch('/api/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        output.innerText += `\n[Server Error ${response.status}]: ${errorText}\n`;
                        return;
                    }

                    const data = await response.json();

                    if (data.error && data.error !== "") {
                        output.innerText += "\n[Error]: " + data.error + "\n";
                    }
                    output.innerText = data.output || "No output returned.";
                } catch (err) {
                    output.innerText = "Error connecting to server: " + err.message;
                }
            });

            document.getElementById('clear-terminal').addEventListener('click', () => {
                output.innerText = "";
            });
        });
    </script>
</body>

</html>
