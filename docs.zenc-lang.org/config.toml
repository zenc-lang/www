# THE ZEN C DOCUMENTATION CONFIG
base_url = "https://docs.zenc-lang.org"
default_language = "en"

[languages]
en = { title = "Zen C Documentation", description = "Official Grimoire for the Zen C Systems Language." }
de = { title = "Zen C Dokumentation", description = "Offizielles Grimoire für die Zen C Systemsprache." }
es = { title = "Documentación de Zen C", description = "Grimorio oficial del lenguaje de sistemas Zen C." }
it = { title = "Documentazione Zen C", description = "Grimorio ufficiale per il linguaggio di sistema Zen C." }
pt = { title = "Documentação Zen C", description = "Grimório oficial para a linguagem de sistemas Zen C." }
ru = { title = "Документация Zen C", description = "Официальный гримуар системного языка Zen C." }
"zh-cn" = { title = "Zen C 文档", description = "Zen C 系统语言官方手册。" }
"zh-tw" = { title = "Zen C 文件", description = "Zen C 系統語言官方手冊。" }

# THEME SETTINGS
compile_sass = false
highlight_code = true
highlight_theme = "css"

[extra]
version = "v0.4.4"
github_url = "https://github.com/zenc-lang/zenc"

[markdown]
render_emoji = true
external_links_target_blank = true
highlight_code = true
highlight_theme = "css"
render_with_code_block_copy_button = true

[search]
build_search_index = true
index_format = "elasticlunr_javascript"
