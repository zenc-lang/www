name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Fetch GitHub Sponsors
        continue-on-error: true # Don't break the build if sponsors fetch fails
        run: |
          mkdir -p docs.zenc-lang.org/static/data
          # Use a more resilient curl with fallback for the JSON
          # We'll try to fetch the sponsors and format them as a clean array
          # If it fails, we write an empty array so Zola doesn't crash
          JSON_DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.WEBSITE_REPO_TOKEN }}" \
               -X POST -d '{"query": "query { user(login: \"Zuhaitz-dev\") { sponsorshipsAsMaintainer(first: 100) { nodes { sponsorEntity { ... on User { login avatarUrl url } ... on Organization { login avatarUrl url } } } } } }"}' \
               https://api.github.com/graphql)
          
          # Check if the response contains data and flatten it
          if echo "$JSON_DATA" | grep -q "sponsorshipsAsMaintainer"; then
            echo "$JSON_DATA" | jq '[.data.user.sponsorshipsAsMaintainer.nodes[] | .sponsorEntity | select(. != null)]' > docs.zenc-lang.org/static/data/sponsors.json
          else
            # Fallback to a default list if fetch fails
            echo '[{"login": "Zuhaitz-dev", "avatarUrl": "https://github.com/Zuhaitz-dev.png", "url": "https://github.com/Zuhaitz-dev"}]' > docs.zenc-lang.org/static/data/sponsors.json
            echo "Sponsors fetch failed, using fallback. Response: $JSON_DATA"
          fi
          
          # Copy the JSON to the main website folder to avoid CORS issues
          cp docs.zenc-lang.org/static/data/sponsors.json zenc/sponsors.json

      - name: Build Zola Docs
        run: |
          wget -qO- https://github.com/getzola/zola/releases/download/v0.18.0/zola-v0.18.0-x86_64-unknown-linux-gnu.tar.gz | tar xz          
          ./zola --root docs.zenc-lang.org build

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts


      - name: Sync files to /var/www/
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" zenc/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/var/www/zenc/          
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" cgit-theme/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/var/www/cgit-theme/
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" docs.zenc-lang.org/public/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/var/www/docs.zenc-lang.org/public/
      - name: Purge Cloudflare Cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'
